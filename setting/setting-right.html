<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>设置 - 右侧栏</title>
    <link rel="stylesheet" href="setting_basic.css">

    <script src="../default_var.js"></script> <!-- 全局变量 -->
   
    <script src="Sortable.min.js"></script>  <!-- Sortable 轻量库：处理跨列拖拽与排序 -->

    <script src="drag_init.js"></script>
    <script src="setting_basic.js"></script>
    <style>
        * {
            box-sizing: border-box;
            user-select: none;
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
        }
        /* body {
            min-height: 100vh;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 16px;
        } */
        /* 仅保留两个列的大容器 */
        .board {
            place-self: center;
            max-width: 1100px;
            width: 100%;
            background: rgba(255,255,255,0.6);
            backdrop-filter: blur(8px);
            border-radius: 32px;
            box-shadow: 0 20px 40px -10px rgba(0,30,50,0.3);
            padding: 24px;
        }
        .columns {
            display: flex;
            gap: 24px;
            flex-wrap: wrap;
        }
        .column {
            flex: 1 1 280px;
            background: rgba(255,255,255,0.8);
            border-radius: 24px;
            box-shadow: inset 0 1px 3px rgba(0,0,0,0.05), 0 8px 20px rgba(0,40,60,0.1);
            padding: 16px;
            border: 1px solid rgba(255,255,255,0.7);
        }
        .column-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 8px 12px 8px;
            border-bottom: 2px dashed #bdd3e0;
            margin-bottom: 16px;
        }
        .column-header h3 {
            margin: 0;
            font-weight: 600;
            font-size: 1.3rem;
        }
        .todo .column-header h3 { color: #1a7f5c; }
        .delete .column-header h3 { color: #bc4e5a; }
        /* 列表容器 —— Sortable 拖拽区域 */
        .list {
            list-style: none;
            margin: 0;
            padding: 8px 4px;
            min-height: 280px;
            background: rgba(245, 249, 252, 0.4);
            border-radius: 18px;
            /* transition: background 0.15s; */
        }
        .list.sortable-ghost {
            background: #cfe7ff;
        }
        /* 可拖拽项 */
        .select_item {
            background: white;
            margin: 8px 0;
            padding: 16px 18px;
            border-radius: 40px;
            box-shadow: 0 4px 10px rgba(0, 20, 30, 0.08), 0 1px 2px rgba(0,0,0,0.05);
            border: 1px solid rgba(220, 235, 245, 0.8);
            font-weight: 500;
            color: #1a3b4e;
            cursor: grab;
            transition: all 0.15s, box-shadow 0.2s;
            display: flex;
            align-items: center;
            backdrop-filter: blur(2px);
            word-break: break-word;
        }
        .select_item:hover {
            background: #f6fbfe;
            box-shadow: 0 8px 18px rgba(30, 100, 140, 0.12);
            transform: scale(1.01);
            border-color: #aac9df;
        }
        .select_item:active {
            cursor: grabbing;
            background: #e3f0f8;
            transform: scale(0.99);
        }
        .sortable-ghost {
            opacity: 0.45;
            background: #c8dbe9;
            border: 2px dashed #3a7899;
        }
        .sortable-drag {
            opacity: 0.9;
            transform: rotate(1deg);
            box-shadow: 0 20px 30px -8px #1a4b66;
        }
        .badge-id {
            font-size: 0.6rem;
            background: #cbdde9;
            color: #1d4c66;
            padding: 2px 8px;
            border-radius: 30px;
            margin-left: 12px;
            font-weight: 400;
        }
        .select_item-text {
            flex: 1;
        }
    </style>
</head>
<body>

    <div class="top">
        <h1>百度优化插件设置</h1>
    </div>
    <div class="sider">
        <div class="item left">
            <a href="setting-left.html">
                <p>左侧栏</p>
            </a>
        </div>
        <div class="item right">
            <a href="#">
                <p>右侧栏</p>
            </a>
        </div>
        <div class="item about">
            <a href="setting.html">
                <p>关于</p>
            </a>
        </div>
    </div>
    <div class="content">

        <div class="board">
            <!-- 仅保留两个核心框：实现(左) 与 不显示(右) -->
            <div class="columns">
                <!-- 左侧：实现框 -->
                <div class="column todo">
                    <div class="column-header">
                        <h3>✅ 显示</h3>
                    </div>
                    <ul id="list-todo" class="list todo-list"></ul>
                </div>

                <!-- 右侧：不显示框 -->
                <div class="column delete">
                    <div class="column-header">
                        <h3>🗑️ 不显示</h3>
                    </div>
                    <ul id="list-delete" class="list delete-list"></ul>
                </div>
            </div>
        </div>
    
        <div class="buttons card-left-use">
            <label>
                <p>第二页后不显示提取栏:</p>
                <div class="btn_on_off donot_show_extract_on_2nd_pg">
                    <span class="btn-on-circle"></span>
                    <span class="btn-on-text">ON</span>
                </div>
            </label>
            
            <button id="saveBtn" href="javascript:void(0);">保存</button>
        </div>
    </div>
</body>
</html>
